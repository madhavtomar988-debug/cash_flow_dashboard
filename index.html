<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header">
    <h1>Cash Flow Dashboard</h1>
    <button id="darkModeBtn">🌙</button>
</div>
    
    <div class="container">

       <input type="number" id="salary" placeholder="Enter Total Salary">

       <input
    type="text"
    id="expenseName"
    placeholder="Expense Name"
    pattern="[A-Za-z ]+"
/>
       <input type="number" id="expenseAmount" placeholder="Expense Amount">

       <button id="addExpenseBtn">Add Expense</button>

       <h2 id="remainingBalance">Remaining Balance: ₹0</h2>
       <p id="warningMessage"></p>
       <h2 id="totalExpenses">Total Expenses: ₹0</h2>

       <h3>Expenses</h3>
       <button id="clearAllBtn">Clear All Expenses</button>

       <ul id="expenseList"></ul>
       <canvas id="expenseChart"></canvas>

</div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    
</body>
</html>
